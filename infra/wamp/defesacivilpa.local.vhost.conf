<VirtualHost *:80>
    ServerName defesacivilpa.local
    DocumentRoot "D:/wamp64/www/defesacivilpa.com.br/public_html"

    <Directory "D:/wamp64/www/defesacivilpa.com.br/public_html">
        AllowOverride All
        Require all granted
        Options Indexes FollowSymLinks
    </Directory>

    ErrorLog "D:/wamp64/logs/defesacivilpa.local-error.log"
    CustomLog "D:/wamp64/logs/defesacivilpa.local-access.log" combined
</VirtualHost>
